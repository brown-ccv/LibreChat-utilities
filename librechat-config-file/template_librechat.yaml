# For more information, see the Configuration Guide:
# https://www.librechat.ai/docs/configuration/librechat_yaml

# Configuration version (required)
version: 1.2.9

# Cache settings: Set to true to enable caching
cache: true

# Custom interface configuration
interface:
      # mcpServers:
      #   placeholder: 'MCP Servers'
        
      customWelcome: "Hey {{user.name}}! Welcome to LibreChat"
      
      # Privacy policy settings
      privacyPolicy:
        externalUrl: "https://docs.ccv.brown.edu/ai-tools/"
        openNewTab: true

      # Terms of service
      termsOfService:
        externalUrl: "https://docs.ccv.brown.edu/ai-tools/terms-of-use"
        openNewTab: true
        modalAcceptance: true
        modalTitle: "Terms of Service for Brown-LibreChat"
        modalContent: |
          For a comprehensive overview of our policies, usage guidelines, and user responsibilities, please visit the following URL in your browser:
          https://docs.ccv.brown.edu/ai-tools/terms-of-use
      endpointsMenu: true
      modelSelect: true
      parameters: true
      sidePanel: true
      # presets: true
      prompts: true
      bookmarks: true
      multiConvo: false
      agents: true
      runCode: false

ocr:
  mistralModel: "mistral-ocr-2505"   # Model name as deployed in Vertex AI
  strategy: "vertexai_mistral_ocr"

registration:
  socialLogins: ['github', 'google', 'discord', 'openid', 'facebook', 'apple']

speech:
      speechTab:
        textToSpeech:
          engineTTS: "external"
          voice: "nova"
          languageTTS: "en"
          automaticPlayback: false
          playbackRate: 1.0
          cacheTTS: true
      stt:
        azureOpenAI:
          instanceName: yxu15-m8exsnfh-eastus2
          apiKey: "${LLAMA_KEY}"
          deploymentName: 'whisper'
          apiVersion: '2024-06-01'
      tts:
        azureOpenAI:
          instanceName: yxu15-m8exsnfh-eastus2
          apiKey: "${LLAMA_KEY}"
          deploymentName: 'gpt-4o-mini-tts'
          apiVersion: '2025-03-01-preview'
          model: 'gpt-4o-mini-tts'
          voices: ['alloy', 'echo', 'fable', 'onyx', 'nova', 'shimmer']

endpoints:
  custom:
        - name: "Legacy Azure-OpenAI"
          # A place holder - otherwise it becomes the default (OpenAI) key
          # Provide the key instead in each "model" block within "litellm/litellm-config.yaml"
          apiKey: "${LITELLM_API_KEY}"
          baseURL: "${LITELLM_URL}"
          iconURL: azureOpenAI
          models:
            default: ['gpt-4o','gpt-4.1','gpt-4.1-mini']
            fetch: false
          titleModel: "gpt-4o"
          modelDisplayLabel: "Custom AI"

